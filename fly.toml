# Fly.io configuration
# Deploy with: fly launch (first time) or fly deploy (subsequent)
app = 'your-app-name'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  DATABASE_URL = 'sqlite:////data/journal.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'journal_data'
  destination = '/data'
  initial_size = '1gb'
